## Web UI will be available on port 55234 once deployed ##

services:
  chronolens:
    build: .
    container_name: chronolens
    image: chronolens:latest
    network_mode: "host"
    volumes:
      - ./data:/app/data        # Persists config + encryption key
      - ./ssh:/app/ssh:ro       # Mount SSH private key (read-only)
    restart: unless-stopped
