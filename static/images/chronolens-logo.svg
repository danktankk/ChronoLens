<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <!-- Outer ring (lens) -->
  <circle cx="20" cy="20" r="16" fill="none" stroke="#22d3ee" stroke-width="1.5" opacity="0.6"/>
  <!-- Inner ring -->
  <circle cx="20" cy="20" r="10" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.4"/>
  <!-- Crosshair lines -->
  <line x1="20" y1="2" x2="20" y2="12" stroke="#22d3ee" stroke-width="1" opacity="0.5"/>
  <line x1="20" y1="28" x2="20" y2="38" stroke="#22d3ee" stroke-width="1" opacity="0.5"/>
  <line x1="2" y1="20" x2="12" y2="20" stroke="#22d3ee" stroke-width="1" opacity="0.5"/>
  <line x1="28" y1="20" x2="38" y2="20" stroke="#22d3ee" stroke-width="1" opacity="0.5"/>
  <!-- Center dot (receiver) -->
  <circle cx="20" cy="20" r="3" fill="#f5a623"/>
  <circle cx="20" cy="20" r="5" fill="none" stroke="#f5a623" stroke-width="0.8" opacity="0.4"/>
  <!-- Satellite dots on orbit -->
  <circle cx="20" cy="5" r="2" fill="#34d399"/>
  <circle cx="33" cy="14" r="1.5" fill="#34d399" opacity="0.7"/>
  <circle cx="8" cy="27" r="1.5" fill="#94a3b8" opacity="0.5"/>
</svg>
