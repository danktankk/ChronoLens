<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="320" viewBox="0 0 1280 320">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#04080f"/>
      <stop offset="50%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#04080f"/>
    </linearGradient>
    <linearGradient id="cyan-glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="50%" stop-color="#22d3ee" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="amber-glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5a623" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#f5a623" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="globe-grad" cx="0.4" cy="0.4" r="0.6">
      <stop offset="0%" stop-color="#0e7490" stop-opacity="0.4"/>
      <stop offset="60%" stop-color="#0a1628" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#04080f" stop-opacity="0.8"/>
    </radialGradient>
    <radialGradient id="star-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="text-glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="soft-glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="320" fill="url(#bg)"/>

  <!-- Grid lines -->
  <g opacity="0.08" stroke="#22d3ee" stroke-width="0.5">
    <line x1="0" y1="80" x2="1280" y2="80"/>
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="160" y1="0" x2="160" y2="320"/>
    <line x1="320" y1="0" x2="320" y2="320"/>
    <line x1="480" y1="0" x2="480" y2="320"/>
    <line x1="640" y1="0" x2="640" y2="320"/>
    <line x1="800" y1="0" x2="800" y2="320"/>
    <line x1="960" y1="0" x2="960" y2="320"/>
    <line x1="1120" y1="0" x2="1120" y2="320"/>
  </g>

  <!-- Stars / dots scattered -->
  <g fill="#22d3ee">
    <circle cx="45" cy="30" r="1" opacity="0.6"/>
    <circle cx="120" cy="70" r="0.8" opacity="0.4"/>
    <circle cx="200" cy="25" r="1.2" opacity="0.5"/>
    <circle cx="310" cy="55" r="0.7" opacity="0.3"/>
    <circle cx="450" cy="40" r="1" opacity="0.5"/>
    <circle cx="520" cy="80" r="0.6" opacity="0.4"/>
    <circle cx="680" cy="30" r="1.1" opacity="0.6"/>
    <circle cx="790" cy="65" r="0.8" opacity="0.3"/>
    <circle cx="880" cy="20" r="1" opacity="0.5"/>
    <circle cx="1000" cy="50" r="0.9" opacity="0.4"/>
    <circle cx="1100" cy="35" r="1.2" opacity="0.5"/>
    <circle cx="1200" cy="75" r="0.7" opacity="0.3"/>
    <circle cx="70" cy="280" r="0.8" opacity="0.3"/>
    <circle cx="180" cy="290" r="1" opacity="0.4"/>
    <circle cx="350" cy="270" r="0.6" opacity="0.3"/>
    <circle cx="900" cy="285" r="0.9" opacity="0.4"/>
    <circle cx="1050" cy="275" r="0.7" opacity="0.3"/>
    <circle cx="1220" cy="295" r="1" opacity="0.4"/>
    <circle cx="60" cy="150" r="0.6" opacity="0.3"/>
    <circle cx="1240" cy="140" r="0.8" opacity="0.3"/>
  </g>

  <!-- Globe wireframe (left side) -->
  <g transform="translate(200, 160)" filter="url(#glow)">
    <!-- Globe body -->
    <circle cx="0" cy="0" r="100" fill="url(#globe-grad)" stroke="#22d3ee" stroke-width="0.8" opacity="0.5"/>

    <!-- Latitude lines -->
    <ellipse cx="0" cy="-50" rx="87" ry="20" fill="none" stroke="#22d3ee" stroke-width="0.5" opacity="0.25"/>
    <ellipse cx="0" cy="0" rx="100" ry="25" fill="none" stroke="#22d3ee" stroke-width="0.6" opacity="0.3"/>
    <ellipse cx="0" cy="50" rx="87" ry="20" fill="none" stroke="#22d3ee" stroke-width="0.5" opacity="0.25"/>

    <!-- Longitude lines -->
    <ellipse cx="0" cy="0" rx="40" ry="100" fill="none" stroke="#22d3ee" stroke-width="0.5" opacity="0.25"/>
    <ellipse cx="0" cy="0" rx="75" ry="100" fill="none" stroke="#22d3ee" stroke-width="0.5" opacity="0.2"/>
    <line x1="0" y1="-100" x2="0" y2="100" stroke="#22d3ee" stroke-width="0.5" opacity="0.25"/>

    <!-- Orbit ring -->
    <ellipse cx="0" cy="0" rx="130" ry="45" fill="none" stroke="#f5a623" stroke-width="0.8" opacity="0.4" stroke-dasharray="4,6" transform="rotate(-20)"/>
    <ellipse cx="0" cy="0" rx="135" ry="50" fill="none" stroke="#22d3ee" stroke-width="0.5" opacity="0.2" stroke-dasharray="3,8" transform="rotate(15)"/>

    <!-- Satellite dots on orbit -->
    <circle cx="125" cy="-20" r="3" fill="#34d399" filter="url(#soft-glow)" opacity="0.9"/>
    <circle cx="-110" cy="35" r="3" fill="#34d399" filter="url(#soft-glow)" opacity="0.9"/>
    <circle cx="40" cy="-43" r="2.5" fill="#f5a623" filter="url(#soft-glow)" opacity="0.8"/>
    <circle cx="-80" cy="-40" r="2" fill="#22d3ee" filter="url(#soft-glow)" opacity="0.7"/>

    <!-- Receiver point -->
    <circle cx="20" cy="-15" r="3" fill="#f5a623" opacity="0.9"/>
    <circle cx="20" cy="-15" r="7" fill="none" stroke="#f5a623" stroke-width="0.8" opacity="0.4"/>
  </g>

  <!-- Horizontal accent line -->
  <rect x="360" y="159" width="560" height="1" fill="url(#cyan-glow)"/>

  <!-- Title: ChronoLens -->
  <text x="640" y="145" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="72" font-weight="700" letter-spacing="6" filter="url(#text-glow)">
    <tspan fill="#22d3ee">Chrono</tspan><tspan fill="#f5a623">Lens</tspan>
  </text>

  <!-- Subtitle -->
  <text x="640" y="185" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="16" fill="#8494a7" letter-spacing="4" font-weight="400">
    NTP / GPS MONITORING DASHBOARD
  </text>

  <!-- Small decorative crosshairs on right side -->
  <g transform="translate(1050, 160)" stroke="#22d3ee" stroke-width="0.6" opacity="0.3">
    <line x1="-20" y1="0" x2="20" y2="0"/>
    <line x1="0" y1="-20" x2="0" y2="20"/>
    <circle cx="0" cy="0" r="12" fill="none"/>
    <circle cx="0" cy="0" r="4" fill="none"/>
  </g>

  <!-- Signal bars (right side decoration) -->
  <g transform="translate(1130, 200)" opacity="0.4">
    <rect x="0" y="-10" width="6" height="10" fill="#34d399" rx="1"/>
    <rect x="10" y="-22" width="6" height="22" fill="#34d399" rx="1"/>
    <rect x="20" y="-35" width="6" height="35" fill="#22d3ee" rx="1"/>
    <rect x="30" y="-50" width="6" height="50" fill="#22d3ee" rx="1"/>
    <rect x="40" y="-42" width="6" height="42" fill="#22d3ee" rx="1"/>
    <rect x="50" y="-28" width="6" height="28" fill="#34d399" rx="1"/>
    <rect x="60" y="-15" width="6" height="15" fill="#34d399" rx="1"/>
  </g>

  <!-- Time offset readout decoration (bottom left) -->
  <g transform="translate(100, 280)" font-family="'Courier New', monospace" font-size="11" fill="#22d3ee" opacity="0.35">
    <text x="0" y="0">OFFSET  +0.000042s</text>
    <text x="0" y="16">STRATUM 1</text>
    <text x="0" y="32">REF     PPS</text>
  </g>

  <!-- Frequency readout (bottom right) -->
  <g transform="translate(1080, 280)" font-family="'Courier New', monospace" font-size="11" fill="#f5a623" opacity="0.35">
    <text x="0" y="0">FREQ   -0.012ppm</text>
    <text x="0" y="16">JITTER  0.000008s</text>
    <text x="0" y="32">SATS    12 LOCKED</text>
  </g>

  <!-- Top/bottom border accents -->
  <rect x="0" y="0" width="1280" height="1" fill="url(#cyan-glow)" opacity="0.5"/>
  <rect x="0" y="319" width="1280" height="1" fill="url(#cyan-glow)" opacity="0.5"/>
</svg>
